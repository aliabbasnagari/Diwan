services:
  backend:
    build:
      context: ./backend
    container_name: diwan-backend
    restart: unless-stopped
    environment:
      LIBRARY_DIR: /music
      DOWNLOAD_DIR: /data/downloads
      CONVERT_DIR: /data/conversions
      DB_PATH: /diwan-data/downloader.db
      MAX_CONCURRENT_DOWNLOADS: "2"
      NAVIDROME_URL: ${NAVIDROME_URL:-http://navidrome:4533}
    volumes:
      - diwan-data:/diwan-data
      - /navidrome/data:/data
      - /navidrome/music:/music
    ports:
      - "4633:4633"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4633/api/health')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    container_name: diwan-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4733:80"

volumes:
  diwan-data:
