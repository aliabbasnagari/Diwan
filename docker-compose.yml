services:
  backend:
    build:
      context: ./backend
    container_name: diwan-backend
    restart: unless-stopped
    environment:
      LIBRARY_DIR: /music
      DOWNLOAD_DIR: /data/downloads
      CONVERT_DIR: /data/conversions
      DB_PATH: /data/downloader.db
      MAX_CONCURRENT_DOWNLOADS: "2"
      NAVIDROME_URL: ${NAVIDROME_URL:?Set NAVIDROME_URL in a .env file — see .env.example}
    volumes:
      - /home/opc/myapps/noorify/data:/data
      - /home/opc/myapps/noorify/music:/music
    ports:
      - "8880:8000"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    container_name: diwan-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8881:80"
